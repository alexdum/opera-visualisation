name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hugging-face-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@6fbce0a787a7146710e588abe7a4fd5eca07f47c
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: alexdum/opera-visualisation
          repo_type: space
          space_sdk: docker
          hf_token: ${{ secrets.HF_SPACE_DEPLOY_TOKEN }}
